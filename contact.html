<!DOCTYPE html>
<html>
<head>
<title>Send Inquiry</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body{
font-family:Arial;
margin:0;
padding:0;
background:#f4f4f4;
}

header{
background:#000;
color:#fff;
padding:15px 0;
}

nav{
width:90%;
margin:auto;
display:flex;
justify-content:space-between;
align-items:center;
}

nav ul{
list-style:none;
display:flex;
}

nav ul li{
margin-left:20px;
}

nav ul li a{
color:#fff;
text-decoration:none;
}

.section{
padding:80px 0;
text-align:center;
background:#fff;
}

form{
width:50%;
margin:auto;
}

form input, form textarea{
width:100%;
padding:12px;
margin:15px 0;
border:1px solid #ccc;
border-radius:4px;
}

button{
background:#caa34d;
color:#fff;
padding:12px 25px;
border:none;
cursor:pointer;
}

button:hover{
background:#a67c2d;
}

footer{
background:#000;
color:#fff;
text-align:center;
padding:20px;
}

@media(max-width:768px){
form{
width:90%;
}
}

</style>
</head>

<body>

<header>

</header>

<section class="section">
<h1>Send Inquiry</h1>

<form onsubmit="sendToWhatsApp(); return false;">
<input type="text" id="name" placeholder="Your Name" required>
<input type="email" id="email" placeholder="Your Email" required>
<textarea id="message" placeholder="Your Message" rows="5" required></textarea>
<button type="submit">Send Message</button>
</form>

</section>
<script>
function sendToWhatsApp() {
    let name = document.getElementById('name').value;
    let email = document.getElementById('email').value;
    let message = document.getElementById('message').value;
    
    let phoneNumber = "919252901816"; 
    
    let url = "https://wa.me/" + phoneNumber + "?text=" 
        + "Name: " + name + "%0a" 
        + "Email: " + email + "%0a" 
        + "Message: " + message;

    window.open(url, '_blank').focus();
}
</script>
<footer>

</footer>

<script>
function submitForm(){
alert("Thank you! Your inquiry has been sent.");
return false;
}
</script>

</body>
</html>
<a href="https://wa.me/919252901816" class="whatsapp-btn" target="_blank">
WhatsApp
</a>
</section>



</body>
</html>
